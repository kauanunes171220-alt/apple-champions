<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Colheita de Maçãs com Loja e Músicas</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #87CEEB;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
        }

        #gameCanvas {
            display: block;
        }

        /* --- HUD (Informações durante o jogo) --- */
        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 20px;
            font-weight: bold;
            color: #2C3E50;
            z-index: 5;
            pointer-events: none;
        }
        #hud span {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 5px 10px;
            border-radius: 10px;
        }

        /* --- Interface do Menu / Loja --- */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.9);
            z-index: 10;
        }

        h1 { color: #E74C3C; margin-bottom: 5px; font-size: 32px; text-align: center; }
        p { color: #34495E; font-size: 16px; text-align: center; margin-bottom: 15px; padding: 0 20px; }
        
        button {
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #2ECC71;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        #shop {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 80%;
            max-width: 300px;
            background: #fdfdfd;
            padding: 15px;
            border-radius: 15px;
            border: 2px solid #ddd;
        }

        .shop-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #ecf0f1;
            padding: 8px 12px;
            border-radius: 10px;
        }

        .shop-item button {
            margin: 0;
            padding: 5px 10px;
            font-size: 14px;
            background-color: #f39c12;
        }

        .shop-item button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .item-info {
            display: flex;
            flex-direction: column;
        }
        .item-name { font-size: 14px; font-weight: bold; color: #2c3e50; }
        .item-cost { font-size: 12px; color: #e67e22; font-weight: bold; }

        #statsDisplay {
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: bold;
            color: #8e44ad;
        }

        #musicWarning {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 10px;
            text-align: center;
        }

    </style>
</head>
<body>

    <div id="hud">
        <span id="scoreDisplay">Pontos: 0</span>
        <span id="coinsDisplay">🪙 0</span>
    </div>

    <div id="ui">
        <h1 id="uiTitle">Colheita de Maçãs</h1>
        <p id="uiDesc">Arraste a cesta para pegar as maçãs!</p>
        
        <div id="statsDisplay">Recorde: 0 | Moedas: 0</div>

        <button id="startBtn">Jogar</button>

        <div id="shop">
            <div style="text-align: center; font-weight: bold; margin-bottom: 5px; color:#2c3e50;">Loja de Power-Ups</div>
            
            <div class="shop-item">
                <div class="item-info">
                    <span class="item-name">Cesta Maior (10s)</span>
                    <span class="item-cost">🪙 100</span>
                </div>
                <button id="btnBuyBasket" onclick="buyPowerUp('basket')">Comprar</button>
            </div>

            <div class="shop-item">
                <div class="item-info">
                    <span class="item-name">Maçãs 2x (Run)</span>
                    <span class="item-cost">🪙 250</span>
                </div>
                <button id="btnBuyDouble" onclick="buyPowerUp('double')">Comprar</button>
            </div>

            <div class="shop-item">
                <div class="item-info">
                    <span class="item-name">Slow Motion (5s)</span>
                    <span class="item-cost">🪙 75</span>
                </div>
                <button id="btnBuySlowMo" onclick="buyPowerUp('slowmo')">Comprar</button>
            </div>
        </div>
        
        <p id="musicWarning">Clique em qualquer lugar para liberar o áudio.</p>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        // --- 1. CONFIGURAÇÃO DOS PREÇOS (CORRIGIDO) ---
        const PRECOS = {
            basket: 100,
            double: 250,
            slowmo: 75
        };

        // --- 2. CONFIGURAÇÃO DAS MÚSICAS ---
        // IMPORTANTE: Substitua os links abaixo pelos arquivos .mp3 diretos.
        const URL_LOBBY = 'https://github.com/kauanunes171220-alt/apple-champions/raw/refs/heads/main/a5.mp3';
        const URLS_INGAME = [
            'https://github.com/kauanunes171220-alt/apple-champions/raw/refs/heads/main/a1.mp3', 
            'https://github.com/kauanunes171220-alt/apple-champions/raw/refs/heads/main/a2.mp3',
            'https://github.com/kauanunes171220-alt/apple-champions/raw/refs/heads/main/a3.mp3'
        ];

        // Cria os objetos de áudio
        const somLobby = new Audio(URL_LOBBY);
        somLobby.loop = true; // O Lobby fica repetindo
        somLobby.volume = 0.5;

        // Cria a lista de áudios do jogo a partir da lista de links
        const audiosInGame = URLS_INGAME.map(url => {
            let a = new Audio(url);
            a.volume = 0.5;
            return a;
        });

        let trackInGameAtual = 0;

        // Função mágica que troca de música automaticamente
        function tocarProximaTrackInGame() {
            // Se o jogo não estiver rodando, não faz nada
            if (!gameRunning) return; 

            // Para a atual e reseta o tempo
            audiosInGame[trackInGameAtual].pause();
            audiosInGame[trackInGameAtual].currentTime = 0;
            
            // Vai para a próxima (se chegar no final, volta pra 0)
            trackInGameAtual = (trackInGameAtual + 1) % audiosInGame.length;
            
            // Toca a nova música
            audiosInGame[trackInGameAtual].play().catch(e => console.log("Áudio bloqueado:", e));
        }

        // Adiciona o evento de 'ended' para que a próxima track toque sozinha
        audiosInGame.forEach(audio => {
            audio.addEventListener('ended', tocarProximaTrackInGame);
        });

        // Controles Globais de Música
        function iniciarMusicaLobby() {
            // Pausa todas as do jogo
            audiosInGame.forEach(a => { a.pause(); a.currentTime = 0; });
            somLobby.play().catch(() => {});
        }

        function iniciarMusicaJogo() {
            somLobby.pause();
            somLobby.currentTime = 0;
            audiosInGame[trackInGameAtual].play().catch(() => {});
        }

        // Para evitar bloqueios do navegador, tocamos o áudio no primeiro clique na tela
        document.body.addEventListener('click', () => {
            if (!gameRunning && somLobby.paused) {
                iniciarMusicaLobby();
                document.getElementById('musicWarning').style.display = 'none';
            }
        }, { once: true });


        // --- CONFIGURAÇÕES ORIGINAIS DO JOGO ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const startBtn = document.getElementById('startBtn');
        const scoreDisplay = document.getElementById('scoreDisplay');
        const coinsDisplay = document.getElementById('coinsDisplay');
        const statsDisplay = document.getElementById('statsDisplay');
        const uiTitle = document.getElementById('uiTitle');
        const uiDesc = document.getElementById('uiDesc');

        const somColeta = new Audio('https://github.com/kauanunes171220-alt/apple-champions/raw/refs/heads/main/a4.mp3');
        const somGameOver = new Audio('https://actions.google.com/sounds/v1/foley/wood_plank_flick.ogg');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let coins = parseInt(localStorage.getItem('appleCoins')) || 0;
        let highScore = parseInt(localStorage.getItem('appleHighScore')) || 0;

        function saveData() {
            localStorage.setItem('appleCoins', coins);
            localStorage.setItem('appleHighScore', highScore);
        }

        let score = 0;
        let gameRunning = false;
        let animationId;
        
        const basketBaseWidth = 90;
        const basket = {
            width: basketBaseWidth,
            height: 30,
            x: canvas.width / 2 - 45,
            y: canvas.height - 60,
            color: '#D35400'
        };

        let apples = [];
        let appleSpawnTimer = 0;
        let appleSpawnRate = 60;
        let appleSpeed = 3;

        let queuedBasket = false;
        let queuedDouble = false;
        let queuedSlowMo = false;

        let activeDouble = false;
        let timerBasket = 0; 
        let timerSlowMo = 0;

        function updateUI() {
            statsDisplay.innerText = `Recorde: ${highScore} | Moedas: 🪙 ${coins}`;
            coinsDisplay.innerText = `🪙 ${coins}`;
            scoreDisplay.innerText = `Pontos: ${score}`;

            document.getElementById('btnBuyBasket').innerText = queuedBasket ? "Equipado" : "Comprar";
            document.getElementById('btnBuyBasket').disabled = queuedBasket || coins < PRECOS.basket;

            document.getElementById('btnBuyDouble').innerText = queuedDouble ? "Equipado" : "Comprar";
            document.getElementById('btnBuyDouble').disabled = queuedDouble || coins < PRECOS.double;

            document.getElementById('btnBuySlowMo').innerText = queuedSlowMo ? "Equipado" : "Comprar";
            document.getElementById('btnBuySlowMo').disabled = queuedSlowMo || coins < PRECOS.slowmo;
        }

        // AGORA USAMOS A CONSTANTE DE PREÇOS AQUI
        window.buyPowerUp = function(type) {
            const cost = PRECOS[type];
            if (coins >= cost) {
                if (type === 'basket' && !queuedBasket) { queuedBasket = true; coins -= cost; }
                if (type === 'double' && !queuedDouble) { queuedDouble = true; coins -= cost; }
                if (type === 'slowmo' && !queuedSlowMo) { queuedSlowMo = true; coins -= cost; }
                saveData();
                updateUI();
            }
        };

        function drawBasket() {
            ctx.fillStyle = timerBasket > 0 ? '#F1C40F' : basket.color;
            ctx.beginPath();
            ctx.roundRect(basket.x, basket.y, basket.width, basket.height, 10);
            ctx.fill();
        }

        function drawApple(apple) {
            ctx.fillStyle = '#E74C3C';
            ctx.beginPath();
            ctx.arc(apple.x, apple.y, apple.radius, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#27AE60';
            ctx.fillRect(apple.x - 2, apple.y - apple.radius - 5, 4, 8);
        }

        function spawnApple() {
            const radius = 15;
            const x = Math.random() * (canvas.width - radius * 2) + radius;
            apples.push({ x: x, y: -radius, radius: radius });
        }

        function update() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#2ECC71';
            ctx.fillRect(0, canvas.height - 30, canvas.width, 30);

            if (timerBasket > 0) {
                timerBasket--;
                if (timerBasket === 0) basket.width = basketBaseWidth; 
            }

            let currentSpeedMultiplier = 1.0;
            if (timerSlowMo > 0) {
                timerSlowMo--;
                currentSpeedMultiplier = 0.4; 
            }

            drawBasket();

            let currentSpawnRate = timerSlowMo > 0 ? appleSpawnRate * 2 : appleSpawnRate;
            
            appleSpawnTimer++;
            if (appleSpawnTimer > currentSpawnRate) {
                spawnApple();
                appleSpawnTimer = 0;
            }

            for (let i = 0; i < apples.length; i++) {
                let a = apples[i];
                a.y += (appleSpeed * currentSpeedMultiplier);
                drawApple(a);

                if (a.y + a.radius > basket.y && a.y - a.radius < basket.y + basket.height) {
                    if (a.x + a.radius > basket.x && a.x - a.radius < basket.x + basket.width) {
                        
                        somColeta.currentTime = 0;
                        somColeta.play();

                        let ganho = activeDouble ? 2 : 1;
                        score += ganho;
                        coins += ganho;
                        
                        scoreDisplay.innerText = `Pontos: ${score}`;
                        coinsDisplay.innerText = `🪙 ${coins}`;

                        apples.splice(i, 1);
                        i--;
                        
                        if (score % 10 === 0 || (activeDouble && score % 10 === 1)) {
                            appleSpeed += 0.5;
                            if (appleSpawnRate > 20) appleSpawnRate -= 5;
                        }
                        continue;
                    }
                }

                if (a.y - a.radius > canvas.height) {
                    gameOver();
                }
            }

            animationId = requestAnimationFrame(update);
        }

        function gameOver() {
            somGameOver.play();
            gameRunning = false;
            cancelAnimationFrame(animationId);
            
            // Retorna para a música do Lobby
            iniciarMusicaLobby();
            
            if (score > highScore) {
                highScore = score;
            }
            saveData();
            updateUI();

            ui.style.display = 'flex';
            uiTitle.innerText = 'Fim de Jogo!';
            uiTitle.style.color = '#C0392B';
            uiDesc.innerText = `Você colheu ${score} maçã(s).\nTotal de moedas: ${coins}`;
            startBtn.innerText = 'Tentar Novamente';
        }

        function startGame() {
            if (queuedBasket) {
                basket.width = basketBaseWidth * 1.25; 
                timerBasket = 600; 
                queuedBasket = false;
            } else {
                basket.width = basketBaseWidth;
                timerBasket = 0;
            }

            if (queuedSlowMo) {
                timerSlowMo = 300; 
                queuedSlowMo = false;
            } else {
                timerSlowMo = 0;
            }

            activeDouble = queuedDouble;
            queuedDouble = false;

            score = 0;
            appleSpeed = 5;
            appleSpawnRate = 60;
            apples = [];
            basket.x = canvas.width / 2 - basket.width / 2;
            
            updateUI();
            
            gameRunning = true;
            ui.style.display = 'none';

            // Inicia a música do jogo
            iniciarMusicaJogo();
            
            update();
        }

        function moveBasket(clientX) {
            let novaPosicao = clientX - basket.width / 2;
            if (novaPosicao < 0) novaPosicao = 0;
            if (novaPosicao + basket.width > canvas.width) novaPosicao = canvas.width - basket.width;
            basket.x = novaPosicao;
        }

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            moveBasket(e.touches[0].clientX);
        }, { passive: false });

        canvas.addEventListener('mousemove', (e) => {
            moveBasket(e.clientX);
        });

        startBtn.addEventListener('click', startGame);

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if(!gameRunning) {
                basket.x = canvas.width / 2 - basket.width / 2;
                basket.y = canvas.height - 60;
            }
        });

        updateUI();
    </script>
</body>
</html>
